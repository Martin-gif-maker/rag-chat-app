<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📄 Chat with your PDF</h1>

        <div class="upload-section">
            <h2>Step 1: Upload a PDF</h2>
            <input type="file" id="fileInput" accept=".pdf">
            <button id="uploadBtn">Upload</button>
            <p id="uploadStatus"></p>
        </div>

        <div class="doc-section">
            <h2>Step 2: Select a Document</h2>
            <select id="docSelect">
                <option value="">-- Upload a PDF first --</option>
            </select>
            <button id="clearChat">🗑️ Clear Chat</button>
        </div>

        <div class="chat-section">
            <h2>Step 3: Ask a Question</h2>
            <div id="chatBox"></div>
            <div class="input-row">
                <input type="text" id="questionInput" placeholder="Ask something about your document...">
                <button id="askBtn">Ask</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
